name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  deployments: write
jobs:
  # デプロイ前にE2Eを実行し、失敗時はデプロイを中止する
  e2e:
    uses: ./.github/workflows/e2e.yml
  deploy:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild esbuild
      - name: Security audit
        run: npm audit --audit-level=high
      - run: npm run build
        env:
          # Cloudflare Web Analytics のサイトトークン（公開値。HTMLに出力される）。
          # GitHub の Settings > Secrets and variables > Actions > Variables に登録。
          PUBLIC_CF_BEACON_TOKEN: ${{ vars.PUBLIC_CF_BEACON_TOKEN }}
      - name: Get git commit hash
        run: echo "GIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-message に ASCII のみを指定（日本語等の非ASCII文字を含むメッセージを
          # Cloudflare Pages API に渡すと code:8000111 エラーになる既知の問題を回避）
          command: pages deploy dist --project-name=tools-codelife-cafe --branch=main --commit-hash=${{ env.GIT_HASH }} --commit-message="Deploy ${{ env.GIT_HASH }}"
