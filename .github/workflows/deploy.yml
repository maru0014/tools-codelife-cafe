name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  deployments: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild esbuild
      - name: Security audit
        run: npm audit --audit-level=high
      - run: npm run build
      - name: Get git commit hash
        run: echo "GIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV
      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-message に ASCII のみを指定（日本語等の非ASCII文字を含むメッセージを
          # Cloudflare Pages API に渡すと code:8000111 エラーになる既知の問題を回避）
          command: pages deploy dist --project-name=tools-codelife-cafe --branch=main --commit-hash=${{ env.GIT_HASH }} --commit-message="Deploy ${{ env.GIT_HASH }}"
